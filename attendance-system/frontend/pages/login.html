<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Attendance Register</title>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1>Attendance Register</h1>
    <p class="sub">QR-BASED ROLL CALL · SIGN IN</p>

    <div id="error" class="error-msg hidden"></div>

    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@school.com" required />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required />

      <button type="submit" class="btn brass" id="submit-btn">Sign in</button>
    </form>

    <p class="hint">Default admin — admin@school.com / admin123</p>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  if (getToken()) window.location.href = 'admin.html';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('error');
    const btn = document.getElementById('submit-btn');
    errorEl.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const data = await api('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      });
      setSession(data.token, data.user);
      window.location.href = 'admin.html';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
